name: COVID-19 ETL Pipeline

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  etl:
    name: Bronze → Silver → Gold
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DB_HOST: aws-0-sa-east-1.pooler.supabase.com
      DB_PORT: "5432"
      DB_NAME: postgres
      DB_USER: postgres.ftbtqqwahzpzwqizigcd
      DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pandas requests psycopg2-binary python-dotenv loguru

      - name: 🔌 Test connection
        run: |
          python3 -c "
          import psycopg2, os
          conn = psycopg2.connect(
            host=os.environ['DB_HOST'], port=os.environ['DB_PORT'],
            dbname=os.environ['DB_NAME'], user=os.environ['DB_USER'],
            password=os.environ['DB_PASSWORD'], sslmode='require'
          )
          cur = conn.cursor()
          cur.execute('SELECT COUNT(*) FROM bronze.covid_raw')
          print(f'✅ Connected via pooler! bronze rows: {cur.fetchone()[0]}')
          
          # Show table structure
          cur.execute('''
            SELECT column_name, data_type FROM information_schema.columns 
            WHERE table_schema=$$bronze$$ AND table_name=$$covid_raw$$
            ORDER BY ordinal_position
          ''')
          for row in cur.fetchall():
            print(f'  col: {row[0]} ({row[1]})')
          conn.close()
          "

      - name: 🟤 BRONZE — Ingest raw COVID data
        run: python pipeline/scripts/ingest_bronze.py

      - name: ⚪ SILVER — Clean and transform
        run: python pipeline/scripts/transform_silver.py

      - name: 🟡 GOLD — Aggregate business layer
        run: python pipeline/scripts/aggregate_gold.py

      - name: ✅ Data quality tests
        run: python pipeline/scripts/run_tests.py

      - name: 📢 Summary
        if: always()
        run: echo "Pipeline finished at $(date -u '+%Y-%m-%d %H:%M UTC')"
