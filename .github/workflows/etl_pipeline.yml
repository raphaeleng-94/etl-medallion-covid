name: COVID-19 ETL Pipeline

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  etl:
    name: Bronze → Silver → Gold
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pandas requests psycopg2-binary python-dotenv loguru

      - name: 🔌 Test DB connection (direct + pooler)
        env:
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          python3 -c "
          import psycopg2, os
          pw = os.environ['DB_PASSWORD']
          
          # Try direct connection
          configs = [
            {'host': 'db.ftbtqqwahzpzwqizigcd.supabase.co', 'port': '5432', 'desc': 'Direct port 5432'},
            {'host': 'aws-0-sa-east-1.pooler.supabase.com', 'port': '5432', 'desc': 'Pooler session port 5432'},
            {'host': 'aws-0-sa-east-1.pooler.supabase.com', 'port': '6543', 'desc': 'Pooler transaction port 6543'},
          ]
          
          for cfg in configs:
            try:
              conn = psycopg2.connect(
                host=cfg['host'], port=cfg['port'],
                dbname='postgres',
                user='postgres.ftbtqqwahzpzwqizigcd',
                password=pw, sslmode='require',
                connect_timeout=10
              )
              cur = conn.cursor()
              cur.execute('SELECT COUNT(*) FROM bronze.covid_raw')
              print(f'✅ {cfg[\"desc\"]}: connected! {cur.fetchone()[0]} rows in bronze')
              conn.close()
              break
            except Exception as e:
              print(f'❌ {cfg[\"desc\"]}: {e}')
          "

      - name: 🟤 BRONZE
        env:
          DB_HOST: aws-0-sa-east-1.pooler.supabase.com
          DB_PORT: "5432"
          DB_NAME: postgres
          DB_USER: postgres.ftbtqqwahzpzwqizigcd
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python pipeline/scripts/ingest_bronze.py

      - name: ⚪ SILVER
        env:
          DB_HOST: aws-0-sa-east-1.pooler.supabase.com
          DB_PORT: "5432"
          DB_NAME: postgres
          DB_USER: postgres.ftbtqqwahzpzwqizigcd
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python pipeline/scripts/transform_silver.py

      - name: 🟡 GOLD
        env:
          DB_HOST: aws-0-sa-east-1.pooler.supabase.com
          DB_PORT: "5432"
          DB_NAME: postgres
          DB_USER: postgres.ftbtqqwahzpzwqizigcd
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python pipeline/scripts/aggregate_gold.py

      - name: ✅ Tests
        env:
          DB_HOST: aws-0-sa-east-1.pooler.supabase.com
          DB_PORT: "5432"
          DB_NAME: postgres
          DB_USER: postgres.ftbtqqwahzpzwqizigcd
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python pipeline/scripts/run_tests.py

      - name: 📢 Summary
        if: always()
        run: echo "Pipeline finished at $(date -u '+%Y-%m-%d %H:%M UTC')"
