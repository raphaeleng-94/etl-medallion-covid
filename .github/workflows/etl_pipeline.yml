name: COVID-19 ETL Pipeline

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  etl:
    name: Bronze → Silver → Gold
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pandas requests psycopg2-binary python-dotenv loguru

      - name: 🔌 Test DB connection
        env:
          DB_HOST: db.ftbtqqwahzpzwqizigcd.supabase.co
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          python3 -c "
          import psycopg2, os
          conn = psycopg2.connect(
            host=os.environ['DB_HOST'], port='5432',
            dbname='postgres', user='postgres',
            password=os.environ['DB_PASSWORD'], sslmode='require'
          )
          cur = conn.cursor()
          cur.execute('SELECT COUNT(*) FROM bronze.covid_raw')
          print(f'✅ Connected! bronze.covid_raw has {cur.fetchone()[0]} rows')
          conn.close()
          "

      - name: 🟤 BRONZE — Ingest
        env:
          DB_HOST: db.ftbtqqwahzpzwqizigcd.supabase.co
          DB_PORT: "5432"
          DB_NAME: postgres
          DB_USER: postgres
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python pipeline/scripts/ingest_bronze.py

      - name: ⚪ SILVER — Transform
        env:
          DB_HOST: db.ftbtqqwahzpzwqizigcd.supabase.co
          DB_PORT: "5432"
          DB_NAME: postgres
          DB_USER: postgres
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python pipeline/scripts/transform_silver.py

      - name: 🟡 GOLD — Aggregate
        env:
          DB_HOST: db.ftbtqqwahzpzwqizigcd.supabase.co
          DB_PORT: "5432"
          DB_NAME: postgres
          DB_USER: postgres
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python pipeline/scripts/aggregate_gold.py

      - name: ✅ Quality tests
        env:
          DB_HOST: db.ftbtqqwahzpzwqizigcd.supabase.co
          DB_PORT: "5432"
          DB_NAME: postgres
          DB_USER: postgres
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python pipeline/scripts/run_tests.py

      - name: 📢 Summary
        if: always()
        run: echo "Pipeline finished at $(date -u '+%Y-%m-%d %H:%M UTC')"
