name: COVID-19 ETL Pipeline

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  etl:
    name: Bronze → Silver → Gold
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pandas requests psycopg2-binary python-dotenv loguru

      - name: 🟤 BRONZE — Ingest raw COVID data
        env:
          DB_HOST: db.ftbtqqwahzpzwqizigcd.supabase.co
          DB_PORT: "5432"
          DB_NAME: postgres
          DB_USER: postgres
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          python pipeline/scripts/ingest_bronze.py > /tmp/bronze_out.txt 2>&1
          EXIT_CODE=$?
          cat /tmp/bronze_out.txt
          if [ $EXIT_CODE -ne 0 ]; then
            # Write error to repo file so we can read via API
            mkdir -p pipeline/logs
            cp /tmp/bronze_out.txt pipeline/logs/last_error.txt
            git config user.email "ci@github.com"
            git config user.name "GitHub Actions"
            git add pipeline/logs/last_error.txt
            git commit -m "ci: capture bronze error log" || true
            git push || true
            exit $EXIT_CODE
          fi

      - name: ⚪ SILVER — Clean and transform
        env:
          DB_HOST: db.ftbtqqwahzpzwqizigcd.supabase.co
          DB_PORT: "5432"
          DB_NAME: postgres
          DB_USER: postgres
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python pipeline/scripts/transform_silver.py

      - name: 🟡 GOLD — Aggregate business layer
        env:
          DB_HOST: db.ftbtqqwahzpzwqizigcd.supabase.co
          DB_PORT: "5432"
          DB_NAME: postgres
          DB_USER: postgres
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python pipeline/scripts/aggregate_gold.py

      - name: ✅ Data quality tests
        env:
          DB_HOST: db.ftbtqqwahzpzwqizigcd.supabase.co
          DB_PORT: "5432"
          DB_NAME: postgres
          DB_USER: postgres
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python pipeline/scripts/run_tests.py

      - name: 📢 Summary
        if: always()
        run: echo "Pipeline finished at $(date -u '+%Y-%m-%d %H:%M UTC')"
