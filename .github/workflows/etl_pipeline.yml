name: COVID-19 ETL Pipeline

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  etl:
    name: Bronze → Silver → Gold
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pandas requests psycopg2-binary python-dotenv loguru

      - name: 🔍 Test bronze table structure
        env:
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          python3 << 'PYEOF'
          import psycopg2, os
          conn = psycopg2.connect(
            host='db.ftbtqqwahzpzwqizigcd.supabase.co',
            port='5432', dbname='postgres', user='postgres',
            password=os.environ['DB_PASSWORD'], sslmode='require'
          )
          cur = conn.cursor()
          
          # Show table columns
          cur.execute("""
            SELECT column_name, data_type, is_nullable 
            FROM information_schema.columns 
            WHERE table_schema='bronze' AND table_name='covid_raw'
            ORDER BY ordinal_position
          """)
          print("=== bronze.covid_raw columns ===")
          for row in cur.fetchall():
            print(f"  {row[0]}: {row[1]} (nullable={row[2]})")
          
          # Test minimal insert
          try:
            cur.execute("SAVEPOINT test_insert")
            cur.execute("""
              INSERT INTO bronze.covid_raw 
                (date, country, iso_code, continent, raw_json, source_url, batch_id, ingested_at)
              VALUES ('2023-01-01', 'Test', 'TST', 'Test', '{}', 'test', 'test-id', NOW())
            """)
            cur.execute("ROLLBACK TO SAVEPOINT test_insert")
            print("✅ Minimal INSERT works!")
          except Exception as e:
            print(f"❌ INSERT failed: {e}")
          
          conn.rollback()
          conn.close()
          PYEOF

      - name: 🟤 BRONZE — Ingest raw COVID data
        env:
          DB_HOST: db.ftbtqqwahzpzwqizigcd.supabase.co
          DB_PORT: "5432"
          DB_NAME: postgres
          DB_USER: postgres
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python pipeline/scripts/ingest_bronze.py

      - name: ⚪ SILVER — Clean and transform
        env:
          DB_HOST: db.ftbtqqwahzpzwqizigcd.supabase.co
          DB_PORT: "5432"
          DB_NAME: postgres
          DB_USER: postgres
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python pipeline/scripts/transform_silver.py

      - name: 🟡 GOLD — Aggregate business layer
        env:
          DB_HOST: db.ftbtqqwahzpzwqizigcd.supabase.co
          DB_PORT: "5432"
          DB_NAME: postgres
          DB_USER: postgres
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python pipeline/scripts/aggregate_gold.py

      - name: ✅ Data quality tests
        env:
          DB_HOST: db.ftbtqqwahzpzwqizigcd.supabase.co
          DB_PORT: "5432"
          DB_NAME: postgres
          DB_USER: postgres
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python pipeline/scripts/run_tests.py

      - name: 📢 Summary
        if: always()
        run: echo "Pipeline finished at $(date -u '+%Y-%m-%d %H:%M UTC')"
