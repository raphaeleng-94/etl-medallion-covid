name: COVID-19 ETL Pipeline

on:
  schedule:
    - cron: '0 7 * * *'   # Daily 07:00 UTC = 04:00 Brasília
  workflow_dispatch:        # Manual trigger

jobs:
  etl:
    name: Bronze → Silver → Gold
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install \
            pandas==2.1.4 \
            requests==2.31.0 \
            psycopg2-binary==2.9.9 \
            python-dotenv==1.0.0 \
            loguru==0.7.2

      - name: 🟤 BRONZE — Ingest raw COVID data
        env:
          DB_HOST: db.ftbtqqwahzpzwqizigcd.supabase.co
          DB_PORT: "5432"
          DB_NAME: postgres
          DB_USER: postgres
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python pipeline/scripts/ingest_bronze.py

      - name: ⚪ SILVER — Clean and transform
        env:
          DB_HOST: db.ftbtqqwahzpzwqizigcd.supabase.co
          DB_PORT: "5432"
          DB_NAME: postgres
          DB_USER: postgres
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python pipeline/scripts/transform_silver.py

      - name: 🟡 GOLD — Aggregate business layer
        env:
          DB_HOST: db.ftbtqqwahzpzwqizigcd.supabase.co
          DB_PORT: "5432"
          DB_NAME: postgres
          DB_USER: postgres
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python pipeline/scripts/aggregate_gold.py

      - name: ✅ Data quality tests
        env:
          DB_HOST: db.ftbtqqwahzpzwqizigcd.supabase.co
          DB_PORT: "5432"
          DB_NAME: postgres
          DB_USER: postgres
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: python pipeline/scripts/run_tests.py

      - name: 📢 Summary
        if: always()
        run: |
          echo "Pipeline finished at $(date -u '+%Y-%m-%d %H:%M UTC')"
