name: COVID-19 ETL Pipeline

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  etl:
    name: Bronze → Silver → Gold
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pandas requests psycopg2-binary python-dotenv loguru

      - name: 🔌 Diagnose connection
        env:
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          python3 << 'PYEOF'
          import psycopg2, os, socket, subprocess

          pw = os.environ['DB_PASSWORD']
          print(f"Password length: {len(pw)} chars")
          
          hosts = [
            ("db.ftbtqqwahzpzwqizigcd.supabase.co", "5432", "postgres"),
            ("aws-0-sa-east-1.pooler.supabase.com", "5432", "postgres.ftbtqqwahzpzwqizigcd"),
            ("aws-0-sa-east-1.pooler.supabase.com", "6543", "postgres.ftbtqqwahzpzwqizigcd"),
          ]
          
          for host, port, user in hosts:
            # DNS check
            try:
              ip = socket.gethostbyname(host)
              print(f"DNS {host} → {ip}")
            except Exception as e:
              print(f"DNS FAIL {host}: {e}")
              continue
            
            # TCP check  
            try:
              s = socket.create_connection((host, int(port)), timeout=5)
              s.close()
              print(f"TCP {host}:{port} → OPEN")
            except Exception as e:
              print(f"TCP {host}:{port} → BLOCKED: {e}")
              continue
            
            # PG connect
            try:
              conn = psycopg2.connect(
                host=host, port=port, dbname='postgres',
                user=user, password=pw, sslmode='require',
                connect_timeout=10
              )
              cur = conn.cursor()
              cur.execute('SELECT 1')
              print(f"PG {host}:{port} → ✅ SUCCESS")
              conn.close()
            except Exception as e:
              print(f"PG {host}:{port} → ❌ {e}")
          PYEOF

      - name: 📢 Summary
        if: always()
        run: echo "Done at $(date -u)"
