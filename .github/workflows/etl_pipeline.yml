name: COVID-19 ETL Pipeline

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  etl:
    name: Bronze → Silver → Gold
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pandas requests psycopg2-binary loguru

      - name: 🔌 Test connection
        run: python pipeline/scripts/test_connection.py

      - name: 🟤 BRONZE
        env:
          DB_HOST: aws-0-sa-east-1.pooler.supabase.com
          DB_PORT: "5432"
          DB_NAME: postgres
          DB_USER: postgres.ftbtqqwahzpzwqizigcd
        run: python pipeline/scripts/ingest_bronze.py

      - name: ⚪ SILVER
        env:
          DB_HOST: aws-0-sa-east-1.pooler.supabase.com
          DB_PORT: "5432"
          DB_NAME: postgres
          DB_USER: postgres.ftbtqqwahzpzwqizigcd
        run: python pipeline/scripts/transform_silver.py

      - name: 🟡 GOLD
        env:
          DB_HOST: aws-0-sa-east-1.pooler.supabase.com
          DB_PORT: "5432"
          DB_NAME: postgres
          DB_USER: postgres.ftbtqqwahzpzwqizigcd
        run: python pipeline/scripts/aggregate_gold.py

      - name: ✅ Tests
        env:
          DB_HOST: aws-0-sa-east-1.pooler.supabase.com
          DB_PORT: "5432"
          DB_NAME: postgres
          DB_USER: postgres.ftbtqqwahzpzwqizigcd
        run: python pipeline/scripts/run_tests.py

      - name: 📢 Summary
        if: always()
        run: echo "Done at $(date -u)"
